<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Маги — Мир Средиземья</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #101010;
            color: white;
        }

        .back {
            display: inline-block;
            margin: 20px;
            color: white;
            text-decoration: none;
            background-color: #333;
            padding: 10px 18px;
            border-radius: 8px;
        }

        .back:hover {
            background-color: #555;
        }

        h1 {
            text-align: center;
            margin: 10px 0 30px;
        }

        .characters-list {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px 40px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .character-button {
            width: 100%;
            text-align: left;
            padding: 16px 20px;
            font-size: 22px;
            background-color: #1f1f1f;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
        }

        .character-button:hover {
            background-color: #2e2e2e;
        }

        .character-content {
            display: none;
            background-color: #181818;
            border-radius: 12px;
            padding: 20px;
        }

        .character-gallery {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 18px;
        }

        .character-gallery img {
            width: 220px;
            height: 140px;
            object-fit: cover;
            border-radius: 10px;
        }

        .character-description {
            line-height: 1.6;
            font-size: 18px;
        }
    </style>
</head>

<body>

<a class="back" href="characters.html">← К расам</a>

<h1>Маги</h1>

<div class="characters-list">

    <button class="character-button" onclick="toggleCharacter('gandalf')">Гэндальф</button>
    <div class="character-content" id="gandalf">
        <div class="character-gallery">
            <img src="../img/characters/ch.gendalf.jpg">
        </div>
        <div class="character-description">
            Гэндальф — один из пяти Истари, посланных в Средиземье для борьбы с силами зла. 
            Один из ключевых героев всей истории.
        </div>
    </div>

    <button class="character-button" onclick="toggleCharacter('saruman')">Саруман</button>
    <div class="character-content" id="saruman">
        <div class="character-gallery">
            <img src="https://images.unsplash.com/photo-1470770841072-f978cf4d019e?w=800">
        </div>
        <div class="character-description">
            Саруман — глава ордена магов, который впоследствии переходит на сторону зла.
        </div>
    </div>

    <button class="character-button" onclick="toggleCharacter('radagast')">Радагаст Бурый</button>
    <div class="character-content" id="radagast">
        <div class="character-gallery">
            <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=800">
        </div>
        <div class="character-description">
            Радагаст — маг, близкий к природе, живущий в лесах и помогающий животным.
        </div>
    </div>

</div>

<script>
function toggleCharacter(id) {
    const block = document.getElementById(id);

    if (block.style.display === "block") {
        block.style.display = "none";
    } else {
        block.style.display = "block";
    }
}
</script>

</body>
</html>
