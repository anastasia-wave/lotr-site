<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Персонажи — Мир Средиземья</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #0f0f0f;
            color: white;
        }

        .page-title {
            text-align: center;
            padding: 40px 20px 20px;
            font-size: 36px;
        }

       .back {
            position: fixed;  
            top: 20px;        
            left: 20px;      

            color: white;
            text-decoration: none;
            background-color: #333;
            padding: 10px 18px;
            border-radius: 8px;

            z-index: 1000;  
        }

        .back:hover {
            background-color: #555;
        }

        .races {
            width: 90%;
            max-width: 1000px;
            margin: 0 auto 50px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .race-card {
            display: flex;
            align-items: center;
            gap: 20px;
            background-color: #1b1b1b;
            border-radius: 14px;
            padding: 16px;
            text-decoration: none;
            color: white;
            transition: 0.3s;
        }

        .race-card:hover {
            background-color: #2c2c2c;
            transform: translateY(-2px);
        }

        .race-card img {
            width: 160px;
            height: 70px;
            object-fit: cover;
            border-radius: 10px;
            flex-shrink: 0;
        }

        .race-card span {
            font-size: 28px;
            font-weight: bold;
        }

        @media (max-width: 700px) {
            .race-card {
                flex-direction: column;
                align-items: flex-start;
            }

            .race-card img {
                width: 100%;
                height: 120px;
            }

            .race-card span {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
