<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Энты — Мир Средиземья</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #101010;
            color: white;
        }

        .back {
            display: inline-block;
            margin: 20px;
            color: white;
            text-decoration: none;
            background-color: #333;
            padding: 10px 18px;
            border-radius: 8px;
        }

        .back:hover {
            background-color: #555;
        }

        h1 {
            text-align: center;
            margin: 10px 0 30px;
        }

        .characters-list {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px 40px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .character-button {
            width: 100%;
            text-align: left;
            padding: 16px 20px;
            font-size: 22px;
            background-color: #1f1f1f;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
        }

        .character-button:hover {
            background-color: #2e2e2e;
        }

        .character-content {
            display: none;
            background-color: #181818;
            border-radius: 12px;
            padding: 20px;
        }

        .character-gallery {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 18px;
        }

        .character-gallery img {
            width: 220px;
            height: 140px;
            object-fit: cover;
            border-radius: 10px;
        }

        .character-description {
            line-height: 1.6;
            font-size: 18px;
        }

        @media (max-width: 700px) {
            .character-gallery img {
                width: 100%;
                height: 190px;
            }

            .character-button {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

    <a class="back" href="characters.html">← К расам</a>

    <h1>Энты</h1>

    <div class="characters-list">

        <button class="character-button" onclick="toggleCharacter('treebeard')">Древобород</button>
        <div class="character-content" id="treebeard">
            <div class="character-gallery">
                <img src="../img/characters/ch.treebeard.jpg">
            </div>
            <div class="character-description">
                Древобород — один из самых древних энтов Средиземья и хранитель леса Фангорн.
                Он помогает Мерри и Пиппину, а затем ведёт энтов против Изенгарда.
            </div>
        </div>

        <button class="character-button" onclick="toggleCharacter('quickbeam')">Быстроног</button>
        <div class="character-content" id="quickbeam">
            <div class="character-gallery">
                <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=800" alt="Быстроног 1">
                <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?w=800" alt="Быстроног 2">
            </div>
            <div class="character-description">
                Быстроног — энт, отличающийся более живым и быстрым характером.
                Он участвует в походе энтов и поддерживает борьбу против Сарумана.
            </div>
        </div>

    </div>

    <script>
        function toggleCharacter(id) {
            const block = document.getElementById(id);

            if (block.style.display === "block") {
                block.style.display = "none";
            } else {
                block.style.display = "block";
            }
        }
    </script>

</body>
</html>
