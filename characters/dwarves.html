<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="stylesheet" href="../css/style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Гномы — Мир Средиземья</title>
</head>
<body>

    <a class="back" href="characters.html">← К расам</a>

    <h1>Гномы</h1>

    <div class="characters-list">

        <button onclick="toggleCharacter('thorin')" class="character-button">Торин Дубощит</button>
        <div id="thorin" class="character-content">
            <div class="character-gallery">
                <img src="../img/characters/ch.torin.jpg">
            </div>
            <p>Торин — наследник королевства Эребор, возглавляет поход к Одинокой горе.</p>
        </div>

        <button onclick="toggleCharacter('balin')" class="character-button">Балин</button>
        <div id="balin" class="character-content">
            <div class="character-gallery">
                <img src="../img/characters/ch.balin.JPG">
            </div>
            <p>Балин — мудрый и опытный гном, один из спутников Бильбо.</p>
        </div>

        <button onclick="toggleCharacter('gimli')" class="character-button">Гимли</button>
        <div id="gimli" class="character-content">
            <div class="character-gallery">
                <img src="../img/characters/ch.gimly.JPG">
            </div>
            <p>Гимли — представитель гномов в Братстве кольца, верный друг Леголаса.</p>
        </div>

    </div>

    <script src="../js/script.js"></script>
</body>
</html>
